<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Files</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h1 {
      border-bottom: 2px solid #ccc;
      padding-bottom: 10px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    ul li {
      margin: 10px 0;
    }
    ul li a {
      text-decoration: none;
      color: #0066cc;
      font-size: 1.1em;
    }
    ul li a:hover {
      text-decoration: underline;
    }
    ul li a::before {
      content: "📄 ";
    }
  </style>
</head>
<body>
  <h1>PDF Files</h1>
  <ul>
    <!-- Add links to your PDF files here, for example:
    <li><a href="example.pdf">Example Document</a></li>
    -->
  </ul>
</body>
</html>
